<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Nuvem Borrada e Reflexo</title>
    <style>
        body { 
            margin: 0; 
            overflow: hidden; 
            background-color: #020205; 
        }
        canvas { display: block; }
    </style>
</head>
<body>

<canvas id="canvas"></canvas>

<script>
const canvas = document.getElementById('canvas');
const ctx = canvas.getContext('2d');

let width, height, groundY;
const letters = "ABCDEFGHIJKLMNOPQRSTUVWXYZ0123456789";
const drops = [];
const particles = [];
const ripples = [];

// Configuração da Nuvem
const cloud = {
    w: 400,
    h: 120,
    y: 100
};

function resize() {
    width = canvas.width = window.innerWidth;
    height = canvas.height = window.innerHeight;
    groundY = height * 0.85;
}

window.addEventListener('resize', resize);
resize();

class Drop {
    constructor() {
        this.reset();
    }

    reset() {
        // Centraliza o nascimento das gotas na largura da nuvem
        const cloudXStart = (width / 2) - (cloud.w / 2);
        this.x = cloudXStart + 50 + Math.random() * (cloud.w - 100);
        this.y = cloud.y + 40; 
        this.vy = Math.random() * 2 + 3;
        this.char = letters[Math.floor(Math.random() * letters.length)];
        this.fontSize = Math.random() * 12 + 12;
        this.opacity = 0;
    }

    update() {
        this.y += this.vy;
        if (this.opacity < 1) this.opacity += 0.05;

        if (Math.random() > 0.9) {
            this.char = letters[Math.floor(Math.random() * letters.length)];
        }

        if (this.y >= groundY) {
            createImpact(this.x, groundY);
            this.reset();
        }
    }

    draw() {
        ctx.font = `${this.fontSize}px monospace`;
        ctx.fillStyle = `rgba(180, 220, 255, ${this.opacity})`;
        ctx.fillText(this.char, this.x, this.y);

        // Reflexo
        ctx.save();
        ctx.translate(0, groundY * 2);
        ctx.scale(1, -1);
        ctx.globalAlpha = 0.1;
        ctx.fillText(this.char, this.x, this.y);
        ctx.restore();
    }
}

class Particle {
    constructor(x, y) {
        this.x = x; this.y = y;
        this.vx = (Math.random() - 0.5) * 2;
        this.vy = (Math.random() - 1) * 1.5;
        this.alpha = 0.6;
    }
    update() { this.x += this.vx; this.y += this.vy; this.alpha -= 0.015; }
    draw() {
        ctx.fillStyle = `rgba(200, 200, 200, ${this.alpha})`;
        ctx.beginPath(); ctx.arc(this.x, this.y, 1.5, 0, Math.PI * 2); ctx.fill();
    }
}

class Ripple {
    constructor(x, y) {
        this.x = x; this.y = y;
        this.r = 2; this.alpha = 0.5;
    }
    update() { this.r += 1.2; this.alpha -= 0.01; }
    draw() {
        ctx.strokeStyle = `rgba(150, 200, 255, ${this.alpha})`;
        ctx.beginPath();
        ctx.ellipse(this.x, this.y, this.r, this.r * 0.3, 0, 0, Math.PI * 2);
        ctx.stroke();
    }
}

function createImpact(x, y) {
    ripples.push(new Ripple(x, y));
    for (let i = 0; i < 3; i++) particles.push(new Particle(x, y));
}

function drawCloud() {
    ctx.save();
    const cx = width / 2;
    const cy = cloud.y;

    // A mágica do borrão:
    ctx.filter = 'blur(25px)'; 
    ctx.fillStyle = "rgba(255, 255, 255, 0.8)";
    
    // Desenho da nuvem centralizada
    ctx.beginPath();
    ctx.arc(cx - 100, cy, 50, 0, Math.PI * 2);
    ctx.arc(cx, cy - 20, 70, 0, Math.PI * 2);
    ctx.arc(cx + 100, cy, 50, 0, Math.PI * 2);
    ctx.arc(cx + 40, cy + 20, 60, 0, Math.PI * 2);
    ctx.arc(cx - 40, cy + 20, 60, 0, Math.PI * 2);
    ctx.fill();
    
    ctx.restore();
}

// Inicialização
for (let i = 0; i < 50; i++) drops.push(new Drop());

function animate() {
    ctx.fillStyle = 'rgba(2, 2, 5, 0.2)'; 
    ctx.fillRect(0, 0, width, height);

    // Chão
    ctx.fillStyle = '#050510';
    ctx.fillRect(0, groundY, width, height - groundY);

    drawCloud();

    drops.forEach(d => { d.update(); d.draw(); });
    
    for (let i = particles.length - 1; i >= 0; i--) {
        particles[i].update(); particles[i].draw();
        if (particles[i].alpha <= 0) particles.splice(i, 1);
    }

    for (let i = ripples.length - 1; i >= 0; i--) {
        ripples[i].update(); ripples[i].draw();
        if (ripples[i].alpha <= 0) ripples.splice(i, 1);
    }

    requestAnimationFrame(animate);
}

animate();
</script>
</body>
</html>
